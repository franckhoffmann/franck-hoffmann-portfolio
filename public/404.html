<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Franck Hoffmann</title>
    <script>
      // Single-Page App redirect for GitHub Pages.
      // Saves the intended URL to sessionStorage, then redirects to the repo root.
      // The script in index.html reads sessionStorage and restores the route.
      var segmentCount = 1; // number of path segments in the repo base (always 1)
      var l = window.location;
      sessionStorage.redirect =
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;
    </script>
    <meta http-equiv="refresh" content="0;URL='/'" />
  </head>
  <body></body>
</html>
