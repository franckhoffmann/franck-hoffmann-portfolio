<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Franck Hoffmann</title>
    <script>
      // SPA redirect for GitHub Pages — via https://github.com/rafgraph/spa-github-pages
      // GitHub serves this 404.html for any unknown path. We encode the intended
      // path as a query param and do a hard redirect to the repo root so that
      // index.html (and React Router) can decode it and render the right page.
      //
      // segmentCount = 1 because the site lives one segment deep:
      //   franckhoffmann.github.io / franck-hoffmann-portfolio / <route>
      //                              └── segment 1 ────────────┘
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
