<!doctype html>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>F</text></svg>" />
    <!-- GitHub Pages SPA: decode route encoded by 404.html and restore it -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          var url = new URL(redirect);
          var route = url.searchParams.get('/');
          if (route) {
            var restored =
              url.origin +
              url.pathname +
              (route ? '/' + route.replace(/~and~/g, '&') : '') +
              (url.hash || '');
            history.replaceState(null, null, restored);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
